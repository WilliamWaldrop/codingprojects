name: Generate Hello World Files

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate Hello World source files
        run: python generate_hello_world.py

      - name: Upload generated files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-files
          path: hello_world_files/
